name: Build GeoIP Data Release

on:
  schedule:
    - cron: '23 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: geoip-data-release
  cancel-in-progress: false

jobs:
  build-data-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download public IP databases
        run: npm run download-db

      - name: Smoke test package before release
        run: |
          cleanup() {
            if [ -f /tmp/chitanda-geoip-api.pid ]; then
              kill "$(cat /tmp/chitanda-geoip-api.pid)" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT
          node --check server.js
          node --check scripts/download-db.js
          HOST=127.0.0.1 PORT=3022 npm start > /tmp/chitanda-geoip-api.log 2>&1 &
          echo $! > /tmp/chitanda-geoip-api.pid
          for i in $(seq 1 40); do curl -fsS http://127.0.0.1:3022/health >/dev/null && break; sleep 0.5; done
          npm run smoke

      - name: Package service with databases
        run: npm run package:release

      - name: Verify minimal release package
        run: |
          tar -tzf release/chitanda-geoip-api-with-data.tar.gz > /tmp/release-files.txt
          required='
          chitanda-geoip-api/server.js
          chitanda-geoip-api/cn-city-centers.js
          chitanda-geoip-api/global-city-centers.js
          chitanda-geoip-api/package.json
          chitanda-geoip-api/package-lock.json
          chitanda-geoip-api/scripts/domestic-apply-release.sh
          chitanda-geoip-api/scripts/install-linux.sh
          chitanda-geoip-api/scripts/sync-domestic-from-current.sh
          chitanda-geoip-api/scripts/update-linux.sh
          chitanda-geoip-api/data/geolite2-city-ipv4.mmdb
          chitanda-geoip-api/data/geolite2-city-ipv6.mmdb
          chitanda-geoip-api/data/asn.mmdb
          chitanda-geoip-api/data/geolite2-geo-whois-asn-country.mmdb
          chitanda-geoip-api/data/ip2region_v4.xdb
          chitanda-geoip-api/data/ip2region_v6.xdb
          '
          for file in $required; do
            grep -Fx "$file" /tmp/release-files.txt >/dev/null || {
              echo "missing release file: $file" >&2
              exit 1
            }
          done
          forbidden='
          chitanda-geoip-api/README.md
          chitanda-geoip-api/README_zh.md
          chitanda-geoip-api/README_zh-TW.md
          chitanda-geoip-api/README_ja.md
          chitanda-geoip-api/LICENSE
          chitanda-geoip-api/docs/avatar.webp
          chitanda-geoip-api/docs/two-node-sync.md
          chitanda-geoip-api/scripts/bootstrap-linux.sh
          chitanda-geoip-api/scripts/download-db.js
          chitanda-geoip-api/scripts/smoke.js
          chitanda-geoip-api/deploy/chitanda-geoip-api.service
          chitanda-geoip-api/deploy/chitanda-geoip-api-update-primary.service
          chitanda-geoip-api/deploy/chitanda-geoip-api-update.service
          chitanda-geoip-api/deploy/chitanda-geoip-api-update.timer
          chitanda-geoip-api/deploy/nginx.example.conf
          '
          for file in $forbidden; do
            if grep -Fx "$file" /tmp/release-files.txt >/dev/null; then
              echo "forbidden release file: $file" >&2
              exit 1
            fi
          done

      - name: Create daily release
        id: create_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="data-$(date -u +%Y%m%d)"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release delete "$tag" --yes --cleanup-tag
          fi
          gh release create "$tag" \
            release/chitanda-geoip-api-with-data.tar.gz \
            release/chitanda-geoip-api-with-data.tar.gz.sha256 \
            scripts/bootstrap-linux.sh \
            --title "GeoIP data $(date -u +%Y-%m-%d)" \
            --notes "Automated package with public GeoIP databases. Generated from commit ${GITHUB_SHA}."

      - name: Update release badge
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.create_release.outputs.tag }}
          BADGE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          branch="${BADGE_BRANCH:-main}"
          endpoint="repos/${GITHUB_REPOSITORY}/contents/.github/badges/release.json"
          file="$(mktemp)"
          gh api "$endpoint?ref=$branch" > "$file"
          current_message="$(jq -r '.content' "$file" | base64 -d | jq -r '.message // ""')"
          if [ "$current_message" = "$RELEASE_TAG" ]; then
            echo "release badge already shows $RELEASE_TAG"
            exit 0
          fi
          sha="$(jq -r '.sha' "$file")"
          payload="$(jq -n --arg tag "$RELEASE_TAG" '{
            schemaVersion: 1,
            label: "release",
            message: $tag,
            color: "0ea5e9"
          }')"
          encoded="$(printf '%s\n' "$payload" | base64 -w0)"
          gh api --method PUT "$endpoint" \
            -f message="chore: update release badge for $RELEASE_TAG" \
            -f content="$encoded" \
            -f sha="$sha" \
            -f branch="$branch" \
            --silent
