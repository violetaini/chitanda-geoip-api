# Put this inside your site server block.
# The API service should listen on 127.0.0.1:3022.
#
# For bare `curl ip.chitanda.net` support, this root handling must exist on
# the HTTP entrypoint too. If a CDN/edge setting forces HTTP to HTTPS before
# the request reaches Nginx, configure the same CLI-root exception at the edge.
# The server block should define the front-end `root`; if the root only exists
# inside an existing `location /`, copy that root directive into `location = /`.

location = / {
    error_page 418 = /__chitanda_plain_myip;

    set $chitanda_plain_myip 0;
    if ($http_user_agent = "") {
        set $chitanda_plain_myip 1;
    }
    if ($http_user_agent ~* "(^|[ /])(curl|wget|httpie|python-requests|python-urllib|go-http-client|libwww-perl|java|okhttp|powershell|axios)(/| |$)") {
        set $chitanda_plain_myip 1;
    }
    if ($chitanda_plain_myip = 1) {
        return 418;
    }

    try_files /index.html =404;
}

location = /__chitanda_plain_myip {
    internal;
    proxy_pass http://127.0.0.1:3022/myip?format=text;
    proxy_set_header Host $host;
    proxy_set_header Accept "text/plain";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Ali-Real-Client-IP $http_ali_real_client_ip;
    proxy_set_header Ali-CDN-Real-IP $http_ali_cdn_real_ip;
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    proxy_set_header True-Client-IP $http_true_client_ip;
}

location = /api/health {
    proxy_pass http://127.0.0.1:3022/health;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /api/myip {
    proxy_pass http://127.0.0.1:3022/myip;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /api/geoip {
    proxy_pass http://127.0.0.1:3022/geoip;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /api/geoip/ {
    proxy_pass http://127.0.0.1:3022/geoip/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
